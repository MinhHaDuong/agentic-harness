name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-tickets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build erg validator
        working-directory: tickets/tools/go
        run: go build -o erg .
      - name: Validate tickets
        run: ./tickets/tools/go/erg validate tickets/

  skill-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md frontmatter
        run: |
          fail=0
          for f in skills/*/SKILL.md; do
            front=$(sed -n '/^---$/,/^---$/p' "$f" | sed '1d;$d')
            if ! echo "$front" | grep -q '^name:'; then
              echo "FAIL: $f missing 'name:' in frontmatter"
              fail=1
            fi
            if ! echo "$front" | grep -q '^description:'; then
              echo "FAIL: $f missing 'description:' in frontmatter"
              fail=1
            fi
          done
          exit $fail

  leak-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for consumer-project assumptions in skills and tickets
        run: bash scripts/check-project-leak.sh
      - name: Self-test — script must catch a deliberate leak
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/skills"
          echo '/home/haduong/CNRS/papiers/actif/SomeProject' > "$tmp/skills/SKILL.md"
          if bash scripts/check-project-leak.sh "$tmp/skills"; then
            echo "FAIL: leak-guard did not catch the deliberate leak"
            exit 1
          fi
          echo "OK: deliberate leak caught"
