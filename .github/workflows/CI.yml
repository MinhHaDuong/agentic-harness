name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-tickets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tickets
        run: chmod +x ./tickets/tools/go/erg && ./tickets/tools/go/erg check tickets/

  skill-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md frontmatter
        run: |
          fail=0
          for f in skills/*/SKILL.md; do
            front=$(sed -n '/^---$/,/^---$/p' "$f" | sed '1d;$d')
            if ! echo "$front" | grep -q '^name:'; then
              echo "FAIL: $f missing 'name:' in frontmatter"
              fail=1
            fi
            if ! echo "$front" | grep -q '^description:'; then
              echo "FAIL: $f missing 'description:' in frontmatter"
              fail=1
            fi
          done
          exit $fail

  leak-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for consumer-project assumptions in skills and tickets
        run: bash scripts/check-project-leak.sh
      - name: Self-test — script must catch a deliberate leak
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/skills"
          echo '/home/someuser/projects/SomeProject' > "$tmp/skills/SKILL.md"
          if bash scripts/check-project-leak.sh "$tmp/skills"; then
            echo "FAIL: leak-guard did not catch the deliberate leak"
            exit 1
          fi
          echo "OK: deliberate leak caught"
      - name: Self-test — escape hatch must suppress a leak
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/skills"
          echo '<!-- harness-extension-point --> /home/someuser/projects/SomeProject' > "$tmp/skills/SKILL.md"
          if ! bash scripts/check-project-leak.sh "$tmp/skills"; then
            echo "FAIL: escape hatch did not suppress the leak"
            exit 1
          fi
          echo "OK: escape hatch suppressed leak"

  pipefail-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: All hook scripts must have set -euo pipefail
        run: |
          missing=$(grep -L 'set -euo pipefail' scripts/*.sh | grep -Ev 'shell-init\.sh|bash-env\.sh' || true)
          if [ -n "$missing" ]; then
            echo "FAIL: missing set -euo pipefail in:"
            echo "$missing"
            exit 1
          fi
          echo "OK: all hook scripts have set -euo pipefail"
      - name: Self-test — guard must catch a script without pipefail
        run: |
          tmp=$(mktemp --suffix=.sh)
          echo '#!/bin/bash' > "$tmp"
          echo 'echo hello' >> "$tmp"
          missing=$(grep -L 'set -euo pipefail' "$tmp" || true)
          if [ -z "$missing" ]; then
            echo "FAIL: guard did not catch missing pipefail"
            exit 1
          fi
          echo "OK: guard catches missing pipefail"
      - name: Self-test — guard must pass when all scripts are compliant
        run: |
          tmp=$(mktemp --suffix=.sh)
          echo '#!/bin/bash' > "$tmp"
          echo 'set -euo pipefail' >> "$tmp"
          echo 'echo hello' >> "$tmp"
          missing=$(grep -L 'set -euo pipefail' "$tmp" || true)
          if [ -n "$missing" ]; then
            echo "FAIL: guard reported false positive on compliant script"
            exit 1
          fi
          echo "OK: guard passes compliant script"
